<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Layout-Test</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="app-layout">
        <header class="header">
            <h1>LMV - Lightweight Mandelbrot Viewer</h1>
            <img src="definition.svg" alt="Mathematical formula for the Mandelbrot set">
        </header>

        <main class="main-area">
            
            <section class="canvas">
                <div class="canvas-wrapper">
                    <canvas id="mandelbrotCanvas" width="1800" height="1350"></canvas>
                </div>
            </section>

            <aside id="control-panel" class="controls">

                <h3>Aktuelle Ansicht</h3>
                <div id="info">Lade...</div>

                <div class="control-group">
                    <h3>Parameter für die Berechnung<h3>
                    <label for="maxIterationsInput">Iterationstiefe:&nbsp;</label>
                    <input
                        id="maxIterationsInput"
                        type="number"
                        min="10"
                        max="2000"
                        step="50"
                        value="100"
                        v-model.number="maxIterationsInput"
                        @change="updateMaxIterations">
>

                    <h3>Image-Korrekturen</h3>
                    <label>Gamma: {{ gamma.toFixed(2) }}</label><br>
                    <input 
                        type="range" 
                        min="0" 
                        max="10" 
                        step="0.2" 
                        v-model.number="gamma"
                        @input="updateGamma">
                    <label>Farbskalierung: {{ colorScalingCorrection.toFixed(2) }}</label><br>
                    <input 
                        type="range" 
                        min="0" 
                        max="5" 
                        step="0.5" 
                        v-model.number="colorScalingCorrection"
                        @input="updateColorscalingCorrection">
                </div>
            </aside>

        </main>

        <footer class="footer">
            Karl & Dirk Geßner, 2026
        </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="script.js"></script>

</body>
</html>
