<!DOCTYPE html>
<html lang="de">
   
<head>
    <meta charset="UTF-8">
    <title>Mandelbrot-Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            background-color:white;
            margin: 0;
            padding: 0;

            min-height: 100dvh;
            overflow: hidden;

            display: grid;
            grid-template-rows: 80px 1fr;
        }

        .page-header {
            height:80px;
            padding: 0 24px;

            display: flex;
            align-items: center;

            border-bottom: 1px solid #aaa;
            background: #e9e9e9;
        }

        .layout {
            min-height: 0;
            overflow: hidden;

            display: grid;
            grid-template-rows: auto auto;
            align-content: start;
        }

        .canvas-area {
            display: grid;
            grid-template-columns: minmax(0, auto) 300px;
            padding: 10px;
            gap: 10px;

            justify-content: left;
            align-items: start;
        }        

        .canvas-wrapper {
            width: min(
                1200px,
                calc(100vw - 300px - 30px),
                calc((100dvh - 80px - 30px - var(--bottom-box-height, 150px)) * 4 / 3)
            );

            aspect-ratio: 4 / 3;
            border: 1px solid #aaa;
        }

        #mandelbrotCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info-box {
            width: 300px;
            align-self: start;

            padding: 10px;
            border: 1px solid #aaa;
            background: #e9e9e9;
        }

        #info {
            font-family: Verdana, Helvetica, Arial, sans-serif;
            font-size: 14px;
        }

        .controls {
            width: 100%;
            max-height: 150px;
            overflow:auto;
            padding: 10px;

            font-family: Verdana, Helvetica, Arial, sans-serif;
            font-size: 14px;

            background: #e9e9e9;
            border-top: 1px solid #aaa;
            border-bottom: 1px solid #aaa;
        }

        h1 {
            margin: 0 0 10px 0;
            font-family:  Verdana, Helvetica, Arial, sans-serif;
        }

    </style>
</head>

<body>

    <header class="page-header">
        <h1>Mandelbrot-Viewer</h1>
    </header>

    <main class="layout">
        <div class="canvas-area">
            <div class="canvas-wrapper">
                <canvas 
                    id="mandelbrotCanvas" 
                    width="1200" 
                    height="900"
                    aria-label="Interaktives Mandelbrot-Set. Klicken Sie mit der rechten Maustaste und scrollen Sie, um hinein zu zoomen. Klicken Sie mit der linken Maustaste, um heraus zu zoomen. Scrollen Sie, um die Iterationstiefe zu ändern.">
                </canvas>
            </div>
            <aside class="info-box">
                <div id="info" aria-live="polite">Lade...</div>
            </aside>
        </div>

        <section class="controls" aria-labelledby="controls-title">
            <h2 id="controls-title">Steuerung</h2>
            <ul>
                <li><strong>Zoom-In:</strong> rechte Maustaste + Mausrad</li>
                <li><strong>Zoom-Out:</strong> linke Maustaste</li>
                <li><strong>Iterationstiefe +/-:</strong> Mausrad</li>
            </ul>
        </section>
    </main>

    <script src="script.js"></script>

</body>

</html>
