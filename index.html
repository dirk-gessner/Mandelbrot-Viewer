<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LVM - Lightweight Mandelbrot Viewer</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="app-layout">
        <header class="header">
            <h1>LMV - Lightweight Mandelbrot Viewer</h1>
            <img src="definition.svg" alt="Mathematical formula for the Mandelbrot set">
        </header>

        <main class="main-area">
            
            <section class="canvas">
                <div class="canvas-wrapper">
                    <canvas id="mandelbrotCanvas"></canvas>
                    <div id="render-Overlay" class="render-overlay">
                        <!-- <div id="overlayText" class="overlay-text">Neurechnung...</div> -->
                    </div>
                </div>
            </section>

            <div class="controls-drawer">
                <aside id="control-panel" class="controls">

                    <h3>Aktuelle Ansicht</h3>
                    <div id="info">Lade...</div>

                    <div class="control-group">
                        <h3>Parameter für die Berechnung</h3>
                        <!--------------------------------------------------------------------->
                        <div class="control-row">
                            <label for="maxIterationsInput">Iterationstiefe:&nbsp;</label>
                            <input
                                id="maxIterationsInput"
                                type="number"
                                min="0"
                                max="2000"
                                step="50"
                                value="100"
                                v-model.number="maxIterationsInput"
                                @change="updateMaxIterations">
                        </div>

                        <div class="control-row">
                            <label for="escapeRadiusInput">Escape-Radius:&nbsp;</label>
                            <input
                                id="escapeRadiusInput"
                                type="number"
                            min="1.1"
                            max="20"
                            step="0.1"
                            value="2"
                            v-model.number="escapeRadiusInput"
                            @change="updateEscapeRadius">
                        </div>
                    </div>

                    <div class="control-group">
                        <h3>Image-Korrekturen</h3>
                        <!--------------------------------------------------------------------->
                        <div class="control-row">
                            <label for="paletteSelect">Farbpalette:</label>
                            <select
                                id="paletteSelect"
                                v-model="selectedPaletteKey"
                                @change="updatePalette">
                                <option
                                    v-for="(palette, key) in availablePalettes"
                                    :key="key"
                                    :value="key">
                                    {{ palette.name }}
                                </option>
                            </select>
                        </div>
                        
                        <div class="control-row">
                            <label for="innerSetColorSelect">Färbung der inneren Menge:</label>
                            <select
                                id="innerSetColorSelect"
                                v-model="selectedInnerSetColorKey"
                                @change="updateInnerSetColor">
                                <option
                                    v-for="(color, key) in availableColors"
                                    :key="key"
                                    :value="key">
                                    {{ key }}
                                </option>
                            </select>
                        </div>
                        
                        <div class="control-row">
                            <label>Gamma: {{ gamma.toFixed(2) }}</label><br>
                            <input 
                                type="range" 
                                min="0" 
                                max="10" 
                                step="0.05" 
                                v-model.number="gamma"
                                @input="updateGamma">
                        </div>

                        <div class="control-row">
                            <label>Korrekturwert Farbskalierung: {{ colorScalingCorrection.toFixed(2) }}</label><br>
                            <input 
                                type="range" 
                                min="0" 
                                max="5" 
                                step="0.5" 
                                v-model.number="colorScalingCorrection"
                                @input="updateColorscalingCorrection">
                        </div>  
                    </div>
                </aside>
            </div>

        </main>

        <footer class="footer">
            Karl & Dirk Geßner, 2026
        </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="script.js"></script>

</body>
</html>
